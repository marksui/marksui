<svg width="1000" height="58" viewBox="0 0 1000 58" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated circuit section divider">
  <defs>
    <linearGradient id="divider-line" x1="120" y1="0" x2="880" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#A7F3D0"/>
      <stop offset="0.82" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#FBBF24" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-glow" x="-10%" y="-80%" width="120%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .rail {
        stroke-dasharray: 22 18;
        animation: dash 4s linear infinite;
      }
      .pulse {
        animation: pulse 2.8s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      .pulse:nth-of-type(2) { animation-delay: .35s; }
      .pulse:nth-of-type(3) { animation-delay: .7s; }
      .pulse:nth-of-type(4) { animation-delay: 1.05s; }
      .pulse:nth-of-type(5) { animation-delay: 1.4s; }
      @keyframes dash {
        to { stroke-dashoffset: -80; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .45; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.32); }
      }
      @media (prefers-reduced-motion: reduce) {
        .rail, .pulse { animation: none; }
      }
    </style>
  </defs>

  <path class="rail" d="M80 29H338L370 13H630L662 29H920" stroke="url(#divider-line)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft-glow)"/>
  <path d="M338 29V45H272M662 29V45H728M370 13V4H432M630 13V4H568" stroke="#94A3B8" stroke-opacity=".35" stroke-width="2" stroke-linecap="round"/>
  <g fill="#E0F2FE" filter="url(#soft-glow)">
    <circle class="pulse" cx="272" cy="45" r="4"/>
    <circle class="pulse" cx="370" cy="13" r="4"/>
    <circle class="pulse" cx="500" cy="13" r="4"/>
    <circle class="pulse" cx="630" cy="13" r="4"/>
    <circle class="pulse" cx="728" cy="45" r="4"/>
  </g>
</svg>
