<svg width="1000" height="70" viewBox="0 0 1000 70" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated circuit section divider">
  <defs>
    <linearGradient id="divider-line" x1="120" y1="0" x2="880" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#A7F3D0"/>
      <stop offset="0.82" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#FBBF24" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="divider-hot" x1="300" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset=".5" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#FB7185" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-glow" x="-10%" y="-80%" width="120%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .rail {
        stroke-dasharray: 22 18;
        animation: dash 3.2s linear infinite;
      }
      .rail-hot {
        stroke-dasharray: 1 360;
        stroke-dashoffset: 0;
        animation: comet 3.2s ease-in-out infinite;
      }
      .pulse {
        animation: pulse 2.8s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      .pulse:nth-of-type(2) { animation-delay: .35s; }
      .pulse:nth-of-type(3) { animation-delay: .7s; }
      .pulse:nth-of-type(4) { animation-delay: 1.05s; }
      .pulse:nth-of-type(5) { animation-delay: 1.4s; }
      .diamond {
        transform-origin: 500px 29px;
        animation: diamond-spin 7s linear infinite;
      }
      .spark {
        animation: sparkle 2.6s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      .spark:nth-of-type(2n) { animation-delay: .4s; }
      .spark:nth-of-type(3n) { animation-delay: .8s; }
      @keyframes dash {
        to { stroke-dashoffset: -80; }
      }
      @keyframes comet {
        0% { stroke-dashoffset: 280; opacity: 0; }
        18%, 76% { opacity: 1; }
        100% { stroke-dashoffset: -280; opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .45; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.32); }
      }
      @keyframes diamond-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes sparkle {
        0%, 100% { opacity: .18; transform: scale(.7); }
        50% { opacity: .9; transform: scale(1.25); }
      }
      @media (prefers-reduced-motion: reduce) {
        .rail, .rail-hot, .pulse, .diamond, .spark { animation: none; }
      }
    </style>
  </defs>

  <path class="rail" d="M80 35H338L370 17H630L662 35H920" stroke="url(#divider-line)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft-glow)"/>
  <path class="rail-hot" d="M80 35H338L370 17H630L662 35H920" stroke="url(#divider-hot)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft-glow)"/>
  <path d="M338 35V54H272M662 35V54H728M370 17V6H432M630 17V6H568" stroke="#94A3B8" stroke-opacity=".35" stroke-width="2" stroke-linecap="round"/>
  <rect class="diamond" x="489" y="18" width="22" height="22" rx="4" stroke="#A7F3D0" stroke-opacity=".8" stroke-width="2" filter="url(#soft-glow)"/>
  <g fill="#E0F2FE" filter="url(#soft-glow)">
    <circle class="pulse" cx="272" cy="54" r="4"/>
    <circle class="pulse" cx="370" cy="17" r="4"/>
    <circle class="pulse" cx="500" cy="17" r="4"/>
    <circle class="pulse" cx="630" cy="17" r="4"/>
    <circle class="pulse" cx="728" cy="54" r="4"/>
  </g>
  <g fill="#FBBF24" filter="url(#soft-glow)">
    <circle class="spark" cx="210" cy="35" r="2.2"/>
    <circle class="spark" cx="430" cy="54" r="2.4"/>
    <circle class="spark" cx="570" cy="54" r="2.4"/>
    <circle class="spark" cx="790" cy="35" r="2.2"/>
  </g>
</svg>
