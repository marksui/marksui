<svg width="1000" height="260" viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mark Sui technical stack</title>
  <desc id="desc">A mature dark technical stack board grouped by languages, hardware and EDA, data and math, tools, and delivery.</desc>
  <defs>
    <linearGradient id="bg" x1="32" y1="24" x2="968" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05070D"/>
      <stop offset=".52" stop-color="#0A1220"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="edge" x1="52" y1="0" x2="948" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity=".35"/>
      <stop offset=".5" stop-color="#94A3B8" stop-opacity=".45"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity=".28"/>
    </linearGradient>
    <linearGradient id="trace" x1="78" y1="0" x2="922" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity=".12"/>
      <stop offset=".24" stop-color="#22D3EE" stop-opacity=".8"/>
      <stop offset=".5" stop-color="#A7F3D0" stop-opacity=".7"/>
      <stop offset=".76" stop-color="#FDE68A" stop-opacity=".75"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity=".12"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#CBD5E1" stroke-opacity=".035"/>
    </pattern>
    <pattern id="scan" width="1000" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 0H1000" stroke="#E5E7EB" stroke-opacity=".035"/>
    </pattern>
    <style>
      .label {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0;
      }
      .meta {
        font-family: JetBrains Mono, SFMono-Regular, Consolas, Menlo, monospace;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0;
        fill: #94A3B8;
      }
      .chip-text {
        font-family: JetBrains Mono, SFMono-Regular, Consolas, Menlo, monospace;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0;
        fill: #E5E7EB;
      }
      .panel {
        fill: #0B1220;
        stroke: #334155;
        stroke-opacity: .55;
      }
      .chip {
        fill: #111827;
        stroke-width: 1.2;
      }
      .trace {
        stroke-dasharray: 34 28;
        animation: trace-flow 13s linear infinite;
      }
      .pulse {
        animation: pulse 5.5s ease-in-out infinite;
      }
      @keyframes trace-flow {
        to { stroke-dashoffset: -124; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .34; }
        50% { opacity: .72; }
      }
      @media (prefers-reduced-motion: reduce) {
        .trace, .pulse { animation: none; }
      }
    </style>
  </defs>

  <rect x="30" y="22" width="940" height="216" rx="18" fill="url(#bg)" stroke="url(#edge)"/>
  <rect x="30" y="22" width="940" height="216" rx="18" fill="url(#grid)"/>
  <rect x="30" y="22" width="940" height="216" rx="18" fill="url(#scan)"/>
  <path d="M54 61H946" stroke="#64748B" stroke-opacity=".32"/>
  <path class="trace" d="M78 213H238L270 194H404L432 213H568L600 194H742L772 213H922" stroke="url(#trace)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <text x="58" y="48" class="meta">MARK SUI / TECHNICAL STACK</text>
  <text x="802" y="48" class="meta">RTL / VLSI / TOOLS / MATH</text>

  <g transform="translate(58 78)">
    <rect class="panel" x="0" y="0" width="168" height="118" rx="14"/>
    <text class="label" x="16" y="27" fill="#F97316">Languages</text>
    <g transform="translate(16 43)">
      <rect class="chip" x="0" y="0" width="56" height="25" rx="7" stroke="#F97316"/>
      <text class="chip-text" x="12" y="17">C/C++</text>
      <rect class="chip" x="64" y="0" width="70" height="25" rx="7" stroke="#60A5FA"/>
      <text class="chip-text" x="77" y="17">Python</text>
      <rect class="chip" x="0" y="34" width="48" height="25" rx="7" stroke="#22D3EE"/>
      <text class="chip-text" x="13" y="51">TS</text>
      <rect class="chip" x="56" y="34" width="46" height="25" rx="7" stroke="#F43F5E"/>
      <text class="chip-text" x="71" y="51">C#</text>
      <rect class="chip" x="110" y="34" width="42" height="25" rx="7" stroke="#EAB308"/>
      <text class="chip-text" x="121" y="51">SV</text>
    </g>
  </g>

  <g transform="translate(242 78)">
    <rect class="panel" x="0" y="0" width="178" height="118" rx="14"/>
    <text class="label" x="16" y="27" fill="#38BDF8">Hardware / EDA</text>
    <g transform="translate(16 43)">
      <rect class="chip" x="0" y="0" width="48" height="25" rx="7" stroke="#2DD4BF"/>
      <text class="chip-text" x="11" y="17">RTL</text>
      <rect class="chip" x="56" y="0" width="52" height="25" rx="7" stroke="#A78BFA"/>
      <text class="chip-text" x="68" y="17">VLSI</text>
      <rect class="chip" x="116" y="0" width="42" height="25" rx="7" stroke="#FBBF24"/>
      <text class="chip-text" x="127" y="17">STA</text>
      <rect class="chip" x="0" y="34" width="58" height="25" rx="7" stroke="#22C55E"/>
      <text class="chip-text" x="11" y="51">CMOS</text>
      <rect class="chip" x="66" y="34" width="54" height="25" rx="7" stroke="#93C5FD"/>
      <text class="chip-text" x="77" y="51">FPGA</text>
      <rect class="chip" x="128" y="34" width="34" height="25" rx="7" stroke="#94A3B8"/>
      <text class="chip-text" x="138" y="51">DV</text>
    </g>
  </g>

  <g transform="translate(436 78)">
    <rect class="panel" x="0" y="0" width="172" height="118" rx="14"/>
    <text class="label" x="16" y="27" fill="#A7F3D0">Data + Math</text>
    <g transform="translate(16 43)">
      <rect class="chip" x="0" y="0" width="58" height="25" rx="7" stroke="#38BDF8"/>
      <text class="chip-text" x="11" y="17">linear</text>
      <rect class="chip" x="66" y="0" width="48" height="25" rx="7" stroke="#FACC15"/>
      <text class="chip-text" x="77" y="17">calc</text>
      <rect class="chip" x="122" y="0" width="34" height="25" rx="7" stroke="#FB7185"/>
      <text class="chip-text" x="132" y="17">ML</text>
      <rect class="chip" x="0" y="34" width="58" height="25" rx="7" stroke="#F97316"/>
      <text class="chip-text" x="10" y="51">CUDA</text>
      <rect class="chip" x="66" y="34" width="76" height="25" rx="7" stroke="#84CC16"/>
      <text class="chip-text" x="77" y="51">Jupyter</text>
    </g>
  </g>

  <g transform="translate(624 78)">
    <rect class="panel" x="0" y="0" width="188" height="118" rx="14"/>
    <text class="label" x="16" y="27" fill="#CBD5E1">Tools</text>
    <g transform="translate(16 43)">
      <rect class="chip" x="0" y="0" width="58" height="25" rx="7" stroke="#61DAFB"/>
      <text class="chip-text" x="10" y="17">React</text>
      <rect class="chip" x="66" y="0" width="48" height="25" rx="7" stroke="#A78BFA"/>
      <text class="chip-text" x="77" y="17">Vite</text>
      <rect class="chip" x="122" y="0" width="42" height="25" rx="7" stroke="#F97316"/>
      <text class="chip-text" x="133" y="17">Git</text>
      <rect class="chip" x="0" y="34" width="54" height="25" rx="7" stroke="#FBBF24"/>
      <text class="chip-text" x="10" y="51">Unity</text>
      <rect class="chip" x="62" y="34" width="52" height="25" rx="7" stroke="#34D399"/>
      <text class="chip-text" x="73" y="51">ESP32</text>
      <rect class="chip" x="122" y="34" width="48" height="25" rx="7" stroke="#94A3B8"/>
      <text class="chip-text" x="133" y="51">macOS</text>
    </g>
  </g>

  <g transform="translate(828 78)">
    <rect class="panel" x="0" y="0" width="114" height="118" rx="14"/>
    <text class="label" x="16" y="27" fill="#F59E0B">Delivery</text>
    <g transform="translate(16 43)">
      <rect class="chip" x="0" y="0" width="76" height="25" rx="7" stroke="#F59E0B"/>
      <text class="chip-text" x="10" y="17">Pages</text>
      <rect class="chip" x="0" y="34" width="76" height="25" rx="7" stroke="#38BDF8"/>
      <text class="chip-text" x="10" y="51">static</text>
    </g>
  </g>

  <g class="pulse" opacity=".55">
    <circle cx="78" cy="213" r="3" fill="#E5E7EB"/>
    <circle cx="270" cy="194" r="3" fill="#E5E7EB"/>
    <circle cx="600" cy="194" r="3" fill="#E5E7EB"/>
    <circle cx="922" cy="213" r="3" fill="#E5E7EB"/>
  </g>

  <g font-family="JetBrains Mono, SFMono-Regular, Consolas, Menlo, monospace" font-size="11" font-weight="700" fill="#94A3B8">
    <text x="86" y="229">F = A*B + A&apos;*C</text>
    <text x="414" y="229">sum w_i*x_i</text>
    <text x="722" y="229">slack = T_req - T_arr</text>
  </g>
</svg>
